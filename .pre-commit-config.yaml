repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check src tests
        language: system
        pass_filenames: false
      - id: mypy-src
        name: mypy src
        entry: python -m mypy src/owcopilot
        language: system
        pass_filenames: false
      - id: pytest-offline
        name: pytest -q
        entry: python -m pytest -q
        language: system
        pass_filenames: false

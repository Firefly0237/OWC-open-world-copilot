# OWCopilot Workbench theme — "墨金法典" (ink & bronze codex).
# Palette intent: deep ink night background (long-session friendly, game-tool ambience),
# bronze-gold primary as the "seal/stamp" accent, parchment-tinted text, faint gold borders.
# Newer theme keys (baseRadius/borderColor/...) ship with Streamlit >=1.46; on older versions
# they are ignored with a console warning and the base palette still applies.
[theme]
base = "dark"
primaryColor = "#c9a227"
backgroundColor = "#0d0f14"
secondaryBackgroundColor = "#161a22"
textColor = "#e8e2d0"
linkColor = "#d8b54a"
font = "sans serif"
baseRadius = "0.65rem"
buttonRadius = "0.55rem"
borderColor = "#2a2f3a"
dataframeBorderColor = "#2a2f3a"
showWidgetBorder = true
codeBackgroundColor = "#12151c"
chartCategoricalColors = [
  "#c9a227", "#7fa6c9", "#8fae8b", "#b07fc9", "#c97f7f",
  "#7fc9b4", "#c9a87f", "#9aa3b2",
]

[theme.sidebar]
backgroundColor = "#0a0c10"
secondaryBackgroundColor = "#141821"
borderColor = "#262b35"

[client]
# Hide the developer toolbar ("Deploy" etc.) — the Workbench faces content designers.
toolbarMode = "minimal"

[server]
headless = true

[browser]
gatherUsageStats = false

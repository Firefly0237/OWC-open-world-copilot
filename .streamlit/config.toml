# OWCopilot Workbench theme — "晨光手稿" (morning manuscript).
# Light parchment direction, mirroring Genshin-style game UI language: warm ivory paper
# (not pure white, to cut glare), ink text, muted-gold seals, faint hairlines.
# Token intent: backgroundColor = bg/base (the page), secondaryBackgroundColor = bg/surface-2
# (inputs/secondary panels); cards get a brighter surface + shadow via CSS.
# Newer theme keys need Streamlit >=1.46; older versions ignore them with a console warning.
[theme]
base = "light"
primaryColor = "#b78f2e"
backgroundColor = "#f7f3e9"
secondaryBackgroundColor = "#efe9d9"
textColor = "#2d2618"
linkColor = "#8a6a1e"
font = "sans serif"
baseRadius = "0.65rem"
buttonRadius = "0.55rem"
borderColor = "#e3dac4"
dataframeBorderColor = "#e3dac4"
showWidgetBorder = true
codeBackgroundColor = "#f1ebdc"
chartCategoricalColors = [
  "#b78f2e", "#3f6fae", "#5e8c5a", "#8c5ea0", "#b05656",
  "#3e8c7d", "#a0784a", "#6b7280",
]

[theme.sidebar]
backgroundColor = "#f1ebdc"
secondaryBackgroundColor = "#e9e1cc"
borderColor = "#ddd3b8"

[client]
# Hide the developer toolbar ("Deploy" etc.) — the Workbench faces content designers.
toolbarMode = "minimal"

[server]
headless = true

[browser]
gatherUsageStats = false

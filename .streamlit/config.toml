# OWCopilot Workbench theme — "星海之卷" (the starbound tome).
# As-I've-Written-inspired dark crystal direction: deep-space blue canvas, ivory ink,
# gilded gold accents, starlight-cyan links. Readability first: long text is always
# high-contrast ivory-on-night; gold is reserved for accents and headline numerals.
# Token intent: backgroundColor = bg/base (the night canvas), secondaryBackgroundColor =
# inputs/secondary panels; crystal panes get translucency + gilded edges via CSS.
# Newer theme keys need Streamlit >=1.46; older versions ignore them with a console warning.
[theme]
base = "dark"
primaryColor = "#d9b56c"
backgroundColor = "#0f1530"
secondaryBackgroundColor = "#1c2448"
textColor = "#ece5d3"
linkColor = "#8fd6e8"
font = "sans serif"
baseRadius = "0.65rem"
buttonRadius = "0.55rem"
borderColor = "#2e3658"
dataframeBorderColor = "#2e3658"
showWidgetBorder = true
codeBackgroundColor = "#141b3e"
chartCategoricalColors = [
  "#d9b56c", "#8fd6e8", "#8a7bc8", "#7ec8a0", "#e08585",
  "#8fb8e8", "#d0a878", "#9aa3b8",
]

[theme.sidebar]
backgroundColor = "#0c1128"
secondaryBackgroundColor = "#1a2348"
borderColor = "#262e52"

[client]
# Hide the developer toolbar ("Deploy" etc.) — the Workbench faces content designers.
toolbarMode = "minimal"

[server]
headless = true

[browser]
gatherUsageStats = false
